version: "3.9"

services:

  # ─── PaddleOCR ────────────────────────────────────────────────────────────
  paddleocr:
    build: ./paddleocr
    container_name: paddleocr-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OMP_NUM_THREADS=2        # limit CPU threads per request
    deploy:
      resources:
        limits:
          memory: 4G

  # ─── Whisper (openai-whisper-asr-webservice) ───────────────────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-cpu
    container_name: whisper-api
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=small          # tiny|base|small|medium — small is best CPU trade-off
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper_models:/root/.cache/whisper   # persist downloaded models
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  whisper_models:
